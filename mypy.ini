[mypy]
files = src
exclude = (?:^|/)(llm_sdk|moulinette|callven)(?:/|$)
ignore_missing_imports = True
warn_unused_ignores = True
warn_return_any = True
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-llm_sdk.*]
ignore_errors = True

[mypy-moulinette.*]
ignore_errors = True

[mypy-callven.*]
ignore_errors = True
